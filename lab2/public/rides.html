<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поїздки - Taxi Service</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Taxi Service</a>
    <div class="nav-links">
      <a href="/passengers.html">Пасажири</a>
      <a href="/drivers.html">Водії</a>
      <a href="/rides.html">Поїздки</a>
    </div>
  </nav>
  <main class="container">
    <h1>Поїздки</h1>
    <button class="btn btn-primary" onclick="openCreateModal()">Додати поїздку</button>

    <table>
      <thead>
        <tr>
          <th>Пасажир</th>
          <th>Водій</th>
          <th>Звідки</th>
          <th>Куди</th>
          <th>Ціна (грн)</th>
          <th>Статус</th>
          <th>Дії</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 id="modalTitle">Додати поїздку</h2>
      <form id="form" class="form" style="box-shadow:none;padding:0;margin:0;">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="passengerId">Пасажир</label>
          <select id="passengerId" name="passengerId" required>
            <option value="">-- Оберіть пасажира --</option>
          </select>
        </div>
        <div class="form-group">
          <label for="driverId">Водій</label>
          <select id="driverId" name="driverId" required>
            <option value="">-- Оберіть водія --</option>
          </select>
        </div>
        <div class="form-group">
          <label for="startPoint">Звідки</label>
          <input type="text" id="startPoint" name="startPoint" required>
        </div>
        <div class="form-group">
          <label for="destination">Куди</label>
          <input type="text" id="destination" name="destination" required>
        </div>
        <div class="form-group">
          <label for="price">Ціна (грн)</label>
          <input type="number" id="price" name="price" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label for="status">Статус</label>
          <select id="status" name="status" required>
            <option value="requested">Requested</option>
            <option value="accepted">Accepted</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Зберегти</button>
          <button type="button" class="btn" onclick="closeModal()">Скасувати</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = '/api/rides';
    let passengersCache = [];
    let driversCache = [];

    async function loadSelects() {
      const [pRes, dRes] = await Promise.all([
        fetch('/api/passengers'),
        fetch('/api/drivers'),
      ]);
      passengersCache = await pRes.json();
      driversCache = await dRes.json();

      const pSelect = document.getElementById('passengerId');
      pSelect.innerHTML = '<option value="">-- Оберіть пасажира --</option>' +
        passengersCache.map(p => `<option value="${p._id}">${p.name} (${p.phone})</option>`).join('');

      const dSelect = document.getElementById('driverId');
      dSelect.innerHTML = '<option value="">-- Оберіть водія --</option>' +
        driversCache.map(d => `<option value="${d._id}">${d.name} (${d.licenseNumber})</option>`).join('');
    }

    async function loadData() {
      const res = await fetch(API);
      const data = await res.json();
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${r.passengerId ? r.passengerId.name : '—'}</td>
          <td>${r.driverId ? r.driverId.name : '—'}</td>
          <td>${r.startPoint}</td>
          <td>${r.destination}</td>
          <td>${r.price}</td>
          <td><span class="badge badge-${r.status}">${r.status}</span></td>
          <td class="actions">
            <button class="btn btn-sm" onclick="openEditModal('${r._id}')">Редагувати</button>
            <button class="btn btn-sm btn-danger" onclick="deleteItem('${r._id}')">Видалити</button>
          </td>
        </tr>
      `).join('');
    }

    async function openCreateModal() {
      await loadSelects();
      document.getElementById('modalTitle').textContent = 'Додати поїздку';
      document.getElementById('editId').value = '';
      document.getElementById('form').reset();
      document.getElementById('modal').classList.add('active');
    }

    async function openEditModal(id) {
      await loadSelects();
      const res = await fetch(`${API}/${id}`);
      const r = await res.json();
      document.getElementById('modalTitle').textContent = 'Редагувати поїздку';
      document.getElementById('editId').value = r._id;
      document.getElementById('passengerId').value = r.passengerId?._id || r.passengerId;
      document.getElementById('driverId').value = r.driverId?._id || r.driverId;
      document.getElementById('startPoint').value = r.startPoint;
      document.getElementById('destination').value = r.destination;
      document.getElementById('price').value = r.price;
      document.getElementById('status').value = r.status;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const body = {
        passengerId: document.getElementById('passengerId').value,
        driverId: document.getElementById('driverId').value,
        startPoint: document.getElementById('startPoint').value,
        destination: document.getElementById('destination').value,
        price: parseFloat(document.getElementById('price').value),
        status: document.getElementById('status').value,
      };
      if (id) {
        await fetch(`${API}/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      } else {
        await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      }
      closeModal();
      loadData();
    });

    async function deleteItem(id) {
      if (!confirm('Видалити поїздку?')) return;
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      loadData();
    }

    loadData();
  </script>
</body>
</html>
